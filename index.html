<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>关于我 | 饺子大人</title>
  <link href="./stylesheets/page-style.css" type="text/css" rel="stylesheet">
</head>

<body>

<header>
  <nav id="home-nav">
    <ul>
      <li><a class="nav-home" href="/"><strong id="brand-name">饺子大人</strong></a></li>
      <li style="float:right; margin-right:10px; margin-top:8px;">
        <button type="button" id="switch-zh">中文</button>
        <button type="button" id="switch-ja">日本語</button>
      </li>
    </ul>
  </nav>
</header>

<main>
  <h1 id="hero-title" style="padding:0; margin:0;">关于饺子大人</h1>
  <div class="section ie-size">
    <div class="pad-main">
      <p>
        <img src="./static/img/description/my_pic.PNG"
             alt="My smile" style="float:left;width:20%;padding:10px;border-radius:50%;">
        <span id="intro-0"></span>
      </p>
      <p id="intro-1"></p>
      <p id="intro-2"></p>
      <p id="intro-3"></p>

      <h2 id="positioning-title" class="small-h1"></h2>
      <p id="positioning-summary"></p>

      <h2 id="skills-title" class="small-h1"></h2>
      <div id="skills-groups"></div>

      <p id="closing"></p>

      <br>
      <h2 id="career-title" class="small-h1"></h2>
      <ul id="career-items"></ul>

      <h2 id="projects-title" class="small-h1"></h2>
      <ul id="projects-items"></ul>

      <h2 id="education-title" class="small-h1"></h2>
      <ul id="education-items"></ul>

      <h2 id="certifications-title" class="small-h1"></h2>
      <ul id="certifications-items"></ul>

      <br>
      <h2 id="contact-title" class="small-h1"></h2>
      <p id="contact-desc"></p>
      <div id="contact-table" style="font-size:0.9em;">
        <div class="row">
          <p id="email-label" style="color:#028e3d;"></p>
          <span id="contact-email" style="text-decoration:none; color:#00b359;"></span>
        </div>
        <div class="row">
          <p id="github-label" style="color:#028e3d;"></p>
          <a id="contact-github" href="https://github.com/DumplingsMajesty" style="font-size:0.9em;" target="_blank"></a>
        </div>
        <div class="row">
          <p id="qq-label" style="color:#028e3d;"></p>
          <span id="contact-qq" style="text-decoration:none; color:#00b359;"></span>
        </div>
      </div>
    </div>
  </div>
</main>

<footer>
  <br>
  <p><strong id="footer-email-label">Email:</strong> <span id="footer-email-value"></span></p>
  <p><strong id="footer-updated-label"></strong> <span id="footer-updated-value"></span></p>
  <p id="footer-copyright"></p>
</footer>

<script>
  async function loadLocale(lang) {
    try {
      const res = await fetch('./i18n/' + lang + '.json');
      if (!res.ok) {
        throw new Error('Failed to load locale: ' + lang);
      }
      const data = await res.json();
      applyLocale(data, lang);
      localStorage.setItem('aboutme-lang', lang);
    } catch (err) {
      console.error(err);
    }
  }

  function applyLocale(data, lang) {
    document.documentElement.lang = lang === 'ja' ? 'ja' : 'zh-CN';
    document.title = data.metaTitle;

    document.getElementById('brand-name').textContent = data.brandName;
    document.getElementById('switch-zh').textContent = data.langSwitch.zh;
    document.getElementById('switch-ja').textContent = data.langSwitch.ja;
    document.getElementById('hero-title').textContent = data.heroTitle;

    data.intro.forEach(function (line, index) {
      const el = document.getElementById('intro-' + index);
      if (el) {
        el.textContent = line;
      }
    });

    document.getElementById('positioning-title').textContent = data.positioning.title;
    document.getElementById('positioning-summary').textContent = data.positioning.summary;

    document.getElementById('skills-title').textContent = data.skills.title;
    renderSkillGroups(data.skills.groups);

    document.getElementById('closing').textContent = data.closing;

    renderListSection('career', data.experience.career);
    renderListSection('projects', data.experience.projects);
    renderListSection('education', data.experience.education);
    renderListSection('certifications', data.experience.certifications);

    document.getElementById('contact-title').textContent = data.contact.title;
    document.getElementById('contact-desc').textContent = data.contact.desc;
    document.getElementById('email-label').textContent = data.contact.labels.email;
    document.getElementById('github-label').textContent = data.contact.labels.github;
    document.getElementById('qq-label').textContent = data.contact.labels.qq;
    document.getElementById('contact-email').textContent = data.contact.email;
    const githubLink = document.getElementById('contact-github');
    githubLink.textContent = data.contact.github;
    githubLink.href = data.contact.github;
    document.getElementById('contact-qq').textContent = data.contact.qq;

    document.getElementById('footer-email-label').textContent = data.footer.emailLabel;
    document.getElementById('footer-email-value').textContent = data.contact.email;
    document.getElementById('footer-updated-label').textContent = data.footer.lastUpdatedLabel;
    document.getElementById('footer-updated-value').textContent = data.footer.lastUpdated;
    document.getElementById('footer-copyright').textContent = data.footer.copyright;
  }

  function renderListSection(prefix, section) {
    document.getElementById(prefix + '-title').textContent = section.title;
    const list = document.getElementById(prefix + '-items');
    list.innerHTML = '';
    section.items.forEach(function (item) {
      const li = document.createElement('li');
      li.textContent = item;
      list.appendChild(li);
    });
  }

  function renderSkillGroups(groups) {
    const wrapper = document.getElementById('skills-groups');
    wrapper.innerHTML = '';
    groups.forEach(function (group) {
      const p = document.createElement('p');
      const title = document.createElement('strong');
      title.textContent = group.name + ': ';
      p.appendChild(title);
      p.appendChild(document.createTextNode(group.items.join(' / ')));
      wrapper.appendChild(p);
    });
  }

  document.getElementById('switch-zh').addEventListener('click', function () {
    loadLocale('zh');
  });

  document.getElementById('switch-ja').addEventListener('click', function () {
    loadLocale('ja');
  });

  const initLang = localStorage.getItem('aboutme-lang') || 'zh';
  loadLocale(initLang);
</script>

</body>
</html>
